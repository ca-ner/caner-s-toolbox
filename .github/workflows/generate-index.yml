name: Generate Index HTML

on:
  push:
    branches:
      - main # Change this to 'master' if your default branch is named master

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out full repository history so git log works for older files
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Step 2: Run a script to build a beautifully styled dashboard
    - name: Generate index.html
      run: |
        # Write the HTML header and modern CSS styles
        cat << 'EOF' > index.html
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Project Index</title>
            <style>
                :root {
                    --bg-color: #f8fafc;
                    --card-bg: #ffffff;
                    --text-main: #0f172a;
                    --text-muted: #64748b;
                    --primary: #6366f1;
                    --primary-hover: #4f46e5;
                    --border: #e2e8f0;
                }
                body {
                    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                    background-color: var(--bg-color);
                    color: var(--text-main);
                    margin: 0;
                    padding: 3rem 1rem;
                }
                .container {
                    max-width: 800px;
                    margin: 0 auto;
                }
                header {
                    margin-bottom: 3rem;
                    text-align: center;
                }
                h1 {
                    font-size: 2.5rem;
                    font-weight: 800;
                    letter-spacing: -0.025em;
                    margin: 0 0 0.5rem 0;
                    color: var(--text-main);
                }
                .subtitle {
                    color: var(--text-muted);
                    font-size: 1.1rem;
                    margin: 0;
                }
                .grid {
                    display: flex;
                    flex-direction: column;
                    gap: 1.25rem;
                }
                .card {
                    background: var(--card-bg);
                    border: 1px solid var(--border);
                    border-radius: 12px;
                    padding: 1.5rem;
                    box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.05);
                    transition: all 0.2s ease-in-out;
                    text-decoration: none;
                    display: block;
                }
                .card:hover {
                    border-color: var(--primary);
                    transform: translateY(-2px);
                    box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
                }
                .card-title {
                    color: var(--primary);
                    font-size: 1.25rem;
                    font-weight: 600;
                    margin: 0 0 0.5rem 0;
                }
                .card:hover .card-title {
                    color: var(--primary-hover);
                }
                .card-desc {
                    color: var(--text-muted);
                    font-size: 0.95rem;
                    margin: 0;
                    line-height: 1.5;
                    display: flex;
                    align-items: center;
                    gap: 0.5rem;
                }
            </style>
        </head>
        <body>
            <div class="container">
                <header>
                    <h1>Available Pages</h1>
                    <p class="subtitle">Dynamically generated directory of live layouts</p>
                </header>
                <main class="grid">
        EOF

        # Step 3: Loop through HTML files, grab commit messages, and generate cards
        find . -type f -name "*.html" ! -name "index.html" ! -path '*/.*' | sort | while read -r file; do
          clean_path="${file#./}"
          
          # Get the last commit message for this specific file
          commit_msg=$(git log -1 --pretty=format:%s -- "$file" 2>/dev/null || echo "Initial upload")
          
          # Clean up any HTML-breaking characters inside the commit message
          commit_msg=$(echo "$commit_msg" |
