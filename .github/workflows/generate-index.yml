name: Generate Index HTML

on:
  push:
    branches:
      - main # Change this to 'master' if your default branch is named master

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out full repository history so git log works for older files
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Step 2: Use native Python to safely build the index.html without shell escaping issues
    - name: Generate index.html
      shell: python
      run: |
        import os
        import subprocess
        import html

        # Find all HTML files, ignoring index.html and hidden directories
        html_files = []
        for root, dirs, files in os.walk('.'):
            dirs[:] = [d for d in dirs if not d.startswith('.')]
            for file in files:
                if file.endswith('.html') and file != 'index.html':
                    path = os.path.relpath(os.path.join(root, file), '.')
                    html_files.append(path)
        
        html_files.sort()

        # Build the structured HTML string
        html_content = """<!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Project Index</title>
            <style>
                :root {
                    --bg-color: #f8fafc;
                    --card-bg: #ffffff;
                    --text-main: #0f172a;
                    --text-muted: #64748b;
                    --primary: #6366f1;
                    --primary-hover: #4f46e5;
                    --border: #e2e8f0;
                }
                body {
                    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                    background-color: var(--bg-color);
                    color: var(--text-main);
                    margin: 0;
                    padding: 3rem 1rem;
                }
                .container {
                    max-width: 800px;
                    margin: 0 auto;
                }
                header {
                    margin-bottom: 3rem;
                    text-align: center;
                }
                h1 {
                    font-size: 2.5rem;
                    font-weight: 800;
                    letter-spacing: -0.025em;
                    margin: 0 0 0.5rem 0;
                    color: var(--text-main);
                }
                .subtitle {
                    color: var(--text-muted);
                    font-size: 1.1rem;
                    margin: 0;
                }
                .grid {
                    display: flex;
                    flex-direction: column;
                    gap: 1.25rem;
                }
                .card {
                    background: var(--card-bg);
                    border: 1px solid var(--border);
                    border-radius: 12px;
                    padding: 1.5rem;
                    box-shadow: 0 1px 3px 0 rgba(0,0,0,0.05);
                    transition: all 0.2s ease-in-out;
                    text-decoration: none;
                    display: block;
                }
                .card:hover {
                    border-color: var(--primary);
                    transform: translateY(-2px);
                    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -4px rgba(0,0,0,0.05);
                }
                .card-title {
                    color: var(--primary);
                    font-size: 1.25rem;
                    font-weight: 600;
                    margin: 0 0 0.5rem 0;
                }
                .card:hover .card-title {
                    color: var(--primary-hover);
                }
                .card-desc {
                    color: var(--text-muted);
                    font-size: 0.95rem;
                    margin: 0;
                    line-height: 1.5;
                    display: flex;
                    align-items: center;
                    gap: 0.5rem;
                }
            </style>
        </head>
        <body>
            <div class="container">
                <header>
                    <h1>Available Pages</h1>
                    <p class="subtitle">Dynamically generated directory of live layouts</p>
                </header>
                <main class="grid">
        """

        # Append each file card dynamically
        for file in html_files:
            try:
                commit_msg = subprocess.check_output(
                    ["git", "log", "-1", "--pretty=format:%s", "--", file],
                    stderr=subprocess.DEVNULL
                ).decode("utf-8").strip()
            except Exception:
                commit_msg = "Initial upload"
            
            if not commit_msg:
                commit_msg = "Initial upload"

            # Safely encode special characters to prevent broken HTML
            safe_path = html.escape(file)
            safe_msg = html.escape(commit_msg)

            html_content += f"""            <a href="{safe_path}" class="card">
                        <h2 class="card-title">{safe_path}</h2>
                        <p class="card-desc">📝 {safe_msg}</p>
                    </a>\n"""

        html_content += """        </main>
            </div>
        </body>
        </html>
        """

        # Write out the generated index file
        with open("index.html", "w", encoding="utf-8") as f:
            f.write(html_content)

    # Step 3: Commit and Push changes back to the repository
    with-cleanup: false
    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add index.html
        if ! git diff --cached --quiet; then
          git commit -m "Automated update of index.html with styled layout & commit notes"
          git push
        else
          echo "No changes to index.html"
        fi
